<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Promise of Forever | 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Playfair+Display:ital,wght@0,400;1,600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-red: #ff4d6d;
            --gold: #d4af37;
        }

        body {
            margin: 0;
            padding: 0;
            background: #fff;
            font-family: 'Playfair Display', serif;
            overflow-x: hidden;
            color: #333;
        }

        /* Floating Hearts and Sparkles */
        #canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .content-wrapper {
            position: relative;
            z-index: 2;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 50px 20px;
        }

        /* The Ring Section */
        .ring-container {
            font-size: 80px;
            margin-bottom: 20px;
            animation: float 3s ease-in-out infinite;
            filter: drop-shadow(0 0 15px rgba(212, 175, 55, 0.6));
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(10deg); }
        }

        /* The Poem */
        .poem-section {
            max-width: 600px;
            text-align: center;
            margin: 40px 0;
            font-style: italic;
            line-height: 1.8;
            font-size: 1.2rem;
            color: #555;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeInUp 1.5s forwards 0.5s;
        }

        @keyframes fadeInUp {
            to { opacity: 1; transform: translateY(0); }
        }

        /* Interactive Card */
        .proposal-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(15px);
            border: 2px solid var(--soft-pink);
            padding: 40px;
            border-radius: 40px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 450px;
            width: 100%;
        }

        h1 {
            font-family: 'Dancing Script', cursive;
            font-size: 3rem;
            color: var(--primary-red);
            margin-bottom: 30px;
        }

        .btn-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        button {
            padding: 20px;
            border: none;
            border-radius: 50px;
            background: linear-gradient(45deg, var(--primary-red), #ff85a1);
            color: white;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.4s;
            box-shadow: 0 10px 20px rgba(255, 77, 109, 0.3);
        }

        button:hover {
            transform: scale(1.05);
            box-shadow: 0 15px 30px rgba(255, 77, 109, 0.5);
        }

        /* Hidden Success Message */
        #vow-msg {
            display: none;
            padding-top: 20px;
        }

        .vow-text {
            font-family: 'Dancing Script', cursive;
            font-size: 1.8rem;
            color: #d90429;
            animation: popIn 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes popIn {
            from { transform: scale(0); }
            to { transform: scale(1); }
        }

        .heart-particle {
            position: absolute;
            pointer-events: none;
            animation: fall linear forwards;
        }

        @keyframes fall {
            to { transform: translateY(100vh) rotate(360deg); opacity: 0; }
        }
    </style>
</head>
<body>

    <div id="canvas-container"></div>

    <div class="content-wrapper">
        <div class="ring-container">💍</div>

        <div class="poem-section">
            <p>"In a world of billions, it was always you,<br>
            A dream I chased, a love so true.<br>
            From every sunrise to the silver moon,<br>
            My heart found its home in our quiet tune."</p>
        </div>

        <div class="proposal-card">
            <div id="ask-section">
                <h1>Will you marry me?</h1>
                <div class="btn-container">
                    <button onclick="accepted()">Of course yesss! ❤️</button>
                    <button onclick="accepted()">Can’t wait to say yes! ✨</button>
                </div>
            </div>

            <div id="vow-msg">
                <p class="vow-text">"I would like to be your better half and will forever love you till my last breath."</p>
                <div style="font-size: 50px; margin-top: 20px;">♾️</div>
            </div>
        </div>
    </div>

    <script>
        // Create shimmering heart background
        function createHeart() {
            const container = document.getElementById('canvas-container');
            const heart = document.createElement('div');
            heart.innerHTML = Math.random() > 0.5 ? '❤️' : '✨';
            heart.classList.add('heart-particle');
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.top = '-5vh';
            heart.style.fontSize = Math.random() * 20 + 10 + 'px';
            heart.style.opacity = Math.random();
            const duration = Math.random() * 3 + 4;
            heart.style.animationDuration = duration + 's';
            
            container.appendChild(heart);
            setTimeout(() => heart.remove(), duration * 1000);
        }

        setInterval(createHeart, 200);

        function accepted() {
            document.getElementById('ask-section').style.display = 'none';
            document.getElementById('vow-msg').style.display = 'block';
            
            // Explosion of celebration
            for(let i=0; i<100; i++) {
                setTimeout(createHeart, i * 20);
            }
        }
    </script>
</body>
</html>
